name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, ci/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: go mod download
    
    - name: Run tests
      run: |
        echo "Running tests..."
    
    - name: Build application
      run: go build -o app .
    
    - name: Docker build
      run: docker build -t app:test .
    
    - name: Docker run test
      run: |
        docker network create test-network
        
        docker run -d \
          --name postgres-test \
          --network test-network \
          -e POSTGRES_USER=postgres \
          -e POSTGRES_PASSWORD=postgres \
          -e POSTGRES_DB=appdb \
          postgres:15-alpine
        
        sleep 10
        
        docker run -d \
          --name app-test \
          --network test-network \
          -p 8080:8080 \
          -e DB_HOST=postgres-test \
          -e DB_PORT=5432 \
          -e DB_USER=postgres \
          -e DB_PASSWORD=postgres \
          -e DB_NAME=appdb \
          app:test
        
        sleep 5
        
        docker ps | grep app-test
        
        curl --retry 5 --retry-delay 2 --fail http://localhost:8080/health || exit 1
