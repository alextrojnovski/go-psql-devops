name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, ci/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: go mod download
    
    - name: Run tests
      run: |
        echo "Running tests..."
    
    - name: Build application
      run: go build -o app .
    
    - name: Docker build
      run: docker build -t app:test .
    
    - name: Docker run test
      run: |
        docker run -d -p 8080:8080 --name app-test app:test
        sleep 5
        curl -f http://localhost:8080/health || exit 1

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Docker build & tag
      run: |
        docker build -t myapp:latest .
        docker tag myapp:latest myapp:${{ github.sha }}
    
    - name: Save Docker image
      run: docker save myapp:latest | gzip > myapp.tar.gz
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: myapp.tar.gz
